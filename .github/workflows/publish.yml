  # kilocode_change start
  # Run smoke tests against CLI assets uploaded to the draft GitHub release
  # before publishing the release and package artifacts.
  smoke-test:
    name: Smoke Test (pre-publish gate)
    needs:
      - version
      - build-cli
    if: github.repository == 'AI-Testing-Workbench/testagent-kilo' # testagent_change
    uses: ./.github/workflows/smoke-test.yml
    with:
      cli_version: ${{ needs.version.outputs.version }}
    secrets: inherit
  # kilocode_change end
  publish:
    needs:
      - version
      - build-cli
      - build-vscode
      - smoke-test
    runs-on: ubuntu-24.04
    if: needs.version.outputs.release == 'true'
    steps:
      - uses: actions/checkout@v3

      # 只用来跑 gh release upload
      - uses: ./.github/actions/setup-bun

      - name: Setup Git Committer
        id: committer
        uses: ./.github/actions/setup-git-committer
        with:
          kilo-maintainer-app-id: ${{ secrets.KILO_MAINTAINER_APP_ID }}
          kilo-maintainer-app-secret: ${{ secrets.KILO_MAINTAINER_APP_SECRET }}

      # 下载 CLI 产物
      - uses: actions/download-artifact@v4
        with:
          pattern: testagent-cli-*
          path: packages/testagent-core/packages/opencode/dist
          merge-multiple: true

      # 下载 VS Code 插件产物
      - uses: actions/download-artifact@v4
        with:
          pattern: testagent-vscode-*
          path: packages/kilo-vscode/out
          merge-multiple: true

      # 创建 CLI 压缩包
      - name: Create CLI release archives
        run: |
          cd packages/testagent-core/packages/opencode

          for dir in dist/testagent-*; do
            [ -d "$dir" ] || continue
            platform=$(basename "$dir")

            if [[ "$platform" == *windows* ]]; then
              (cd "$dir/bin" && zip -r "../../${platform}.zip" .)
            else
              tar -czf "dist/${platform}.tar.gz" -C "$dir/bin" .
            fi
          done

          ls -lh dist/*.tar.gz dist/*.zip || true

      # 上传 CLI 到 GitHub Release
      - name: Upload CLI archives to GitHub Release
        run: |
          gh release upload v${{ needs.version.outputs.version }} \
            packages/testagent-core/packages/opencode/dist/*.tar.gz \
            packages/testagent-core/packages/opencode/dist/*.zip \
            --clobber \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ steps.committer.outputs.token }}

      # 上传 VSIX 到 GitHub Release
      - name: Upload VSIX to GitHub Release
        run: |
          gh release upload v${{ needs.version.outputs.version }} \
            packages/kilo-vscode/out/*.vsix \
            --clobber \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ steps.committer.outputs.token }}