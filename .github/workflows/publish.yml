# testagent_change start - simplified workflow
name: publish
run-name: "Build ${{ inputs.platform || 'all platforms' }} from ${{ inputs.branch || github.ref_name }}"

on:
  push:
    branches:
      - main
      - dev
      - beta
  workflow_dispatch:
    inputs:
      branch:
        description: "构建分支 (Branch to build from)"
        required: true
        type: string
        default: "main"
      platform:
        description: "构建平台 (Platform to build)"
        required: true
        type: choice
        options:
          - all
          - linux-x64
          - linux-arm64
          - alpine-x64
          - alpine-arm64
          - darwin-x64
          - darwin-arm64
          - win32-x64
        default: "all"

concurrency: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.platform || 'all' }}
# testagent_change end

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  version:
    runs-on: ubuntu-24.04
    if: github.repository == 'AI-Testing-Workbench/testagent-kilo' # testagent_change
    steps:
      # testagent_change - checkout specified branch
      - uses: actions/checkout@v3
        with:
          ref: ${{ inputs.branch || github.ref }}
          fetch-depth: 0
          submodules: recursive  

      - uses: ./.github/actions/setup-bun

      # kilocode_change start - install deps for version script workspace resolution
      - name: Install dependencies
        run: bun install

      # testagent_change - removed: bun i -g @kilocode/cli (not needed for version script)
      # kilocode_change end

      - id: version
        run: |
          ./script/version.ts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          KILO_API_KEY: ${{ secrets.KILO_API_KEY }}
          KILO_ORG_ID: ${{ secrets.KILO_ORG_ID }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      release: ${{ steps.version.outputs.release }}
      tag: ${{ steps.version.outputs.tag }}

  build-cli:
    needs: version
    runs-on: ubuntu-24.04
    if: github.repository == 'AI-Testing-Workbench/testagent-kilo' # testagent_change
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            script: bun:linux
            binary: testagent
            output_dir: testagent-linux-x64
          - target: linux-arm64
            script: bun:linux-arm64
            binary: testagent
            output_dir: testagent-linux-arm64
          - target: alpine-x64
            script: bun:alpine
            binary: testagent
            output_dir: testagent-linux-x64-musl
          - target: alpine-arm64
            script: bun:alpine-arm64
            binary: testagent
            output_dir: testagent-linux-arm64-musl
          - target: darwin-x64
            script: bun:mac
            binary: testagent
            output_dir: testagent-darwin-x64
          - target: darwin-arm64
            script: bun:mac-arm64
            binary: testagent
            output_dir: testagent-darwin-arm64
          - target: win32-x64
            script: bun:windows
            binary: testagent.exe
            output_dir: testagent-windows-x64-baseline
    steps:
      # testagent_change - skip if platform not selected
      - name: Check if platform should be built
        id: should_build
        run: |
          PLATFORM="${{ inputs.platform }}"
          TARGET="${{ matrix.target }}"
          
          if [ "$PLATFORM" = "all" ] || [ -z "$PLATFORM" ] || [ "$PLATFORM" = "$TARGET" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
            echo "✅ Building $TARGET"
          else
            echo "build=false" >> $GITHUB_OUTPUT
            echo "⏭️  Skipping $TARGET (selected: $PLATFORM)"
          fi

      # testagent_change - checkout specified branch
      - uses: actions/checkout@v3
        if: steps.should_build.outputs.build == 'true'
        with:
          ref: ${{ inputs.branch || github.ref }}
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - uses: ./.github/actions/setup-bun
        if: steps.should_build.outputs.build == 'true'

      - name: Install dependencies
        if: steps.should_build.outputs.build == 'true'
        run: bun install
        working-directory: ./packages/testagent-core

      - name: Build CLI (${{ matrix.target }})
        if: steps.should_build.outputs.build == 'true'
        run: |
          if grep -q "\"${{ matrix.script }}\"" package.json; then
            bun run ${{ matrix.script }}
          else
            echo "Script ${{ matrix.script }} not found, using build.ts directly"
            cross-env OPENCODE_VERSION=${{ needs.version.outputs.version }} \
              OPENCODE_CHANNEL=latest \
              bun packages/opencode/script/build.ts \
              --target=${{ matrix.target }} \
              --skip-models
          fi
        working-directory: ./packages/testagent-core
        env:
          OPENCODE_VERSION: ${{ needs.version.outputs.version }}
          OPENCODE_CHANNEL: latest

      - name: Verify CLI binary
        if: steps.should_build.outputs.build == 'true'
        run: |
          BINARY_PATH="packages/testagent-core/packages/opencode/dist/${{ matrix.output_dir }}/bin/${{ matrix.binary }}"
          if [ ! -f "$BINARY_PATH" ]; then
            echo "❌ Error: ${{ matrix.binary }} not found at $BINARY_PATH!"
            echo "Contents of dist directory:"
            ls -la packages/testagent-core/packages/opencode/dist/ || true
            exit 1
          fi
          echo "✅ CLI binary built successfully"
          ls -lh "$BINARY_PATH"

      # testagent_change - upload only binary (avoid overwriting package.json in consumers)
      - uses: actions/upload-artifact@v4
        if: steps.should_build.outputs.build == 'true'
        with:
          name: testagent-cli-${{ matrix.target }}
          path: packages/testagent-core/packages/opencode/dist/${{ matrix.output_dir }}/bin
          retention-days: 7

    outputs:
      version: ${{ needs.version.outputs.version }}

  build-vscode:
    needs: build-cli
    runs-on: ubuntu-24.04
    if: github.repository == 'AI-Testing-Workbench/testagent-kilo' # testagent_change
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            cli_target: linux-x64
            binary: testagent
          - target: linux-arm64
            cli_target: linux-arm64
            binary: testagent
          - target: alpine-x64
            cli_target: alpine-x64
            binary: testagent
          - target: alpine-arm64
            cli_target: alpine-arm64
            binary: testagent
          - target: darwin-x64
            cli_target: darwin-x64
            binary: testagent
          - target: darwin-arm64
            cli_target: darwin-arm64
            binary: testagent
          - target: win32-x64
            cli_target: win32-x64
            binary: testagent.exe
    steps:
      # testagent_change - skip if platform not selected
      - name: Check if platform should be built
        id: should_build
        run: |
          PLATFORM="${{ inputs.platform }}"
          TARGET="${{ matrix.target }}"
          
          if [ "$PLATFORM" = "all" ] || [ -z "$PLATFORM" ] || [ "$PLATFORM" = "$TARGET" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
            echo "✅ Building VSIX for $TARGET"
          else
            echo "build=false" >> $GITHUB_OUTPUT
            echo "⏭️  Skipping VSIX for $TARGET (selected: $PLATFORM)"
          fi

      # testagent_change - checkout specified branch
      - uses: actions/checkout@v3
        if: steps.should_build.outputs.build == 'true'
        with:
          ref: ${{ inputs.branch || github.ref }}

      - uses: ./.github/actions/setup-bun
        if: steps.should_build.outputs.build == 'true'

      - uses: actions/setup-node@v4
        if: steps.should_build.outputs.build == 'true'
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install @vscode/vsce
        if: steps.should_build.outputs.build == 'true'
        run: bun install -g @vscode/vsce

      - name: Download CLI binary
        if: steps.should_build.outputs.build == 'true'
        uses: actions/download-artifact@v4
        with:
          name: testagent-cli-${{ matrix.cli_target }}
          path: packages/kilo-vscode/bin

      - name: Set executable permissions (Unix)
        if: steps.should_build.outputs.build == 'true' && matrix.binary != 'testagent.exe'
        run: chmod +x packages/kilo-vscode/bin/${{ matrix.binary }}

      - name: Verify CLI binary
        if: steps.should_build.outputs.build == 'true'
        run: |
          if [ ! -f packages/kilo-vscode/bin/${{ matrix.binary }} ]; then
            echo "❌ Error: ${{ matrix.binary }} not found after download!"
            ls -la packages/kilo-vscode/bin/ || true
            exit 1
          fi
          echo "✅ CLI binary downloaded successfully"
          ls -lh packages/kilo-vscode/bin/

      - name: Rebuild SDK types
        if: steps.should_build.outputs.build == 'true'
        run: bun run build
        working-directory: ./packages/sdk/js

      - name: Build extension
        if: steps.should_build.outputs.build == 'true'
        run: |
          bun run check-types
          bun run lint
          node esbuild.js --production
        working-directory: ./packages/kilo-vscode

      - name: Package VSIX for ${{ matrix.target }}
        if: steps.should_build.outputs.build == 'true'
        run: |
          VSIX_NAME="testagent-vscode-${{ matrix.target }}.vsix"
          ARGS="--no-dependencies --skip-license --target ${{ matrix.target }} -o $VSIX_NAME"
          vsce package $ARGS
        working-directory: ./packages/kilo-vscode
        env:
          npm_config_ignore_scripts: "true"

      - name: Verify VSIX package
        if: steps.should_build.outputs.build == 'true'
        run: |
          VSIX_FILE="packages/kilo-vscode/testagent-vscode-${{ matrix.target }}.vsix"
          if [ ! -f "$VSIX_FILE" ]; then
            echo "❌ Error: VSIX package not found!"
            ls -la packages/kilo-vscode/*.vsix || echo "No VSIX files found"
            exit 1
          fi
          echo "✅ VSIX package built successfully"
          ls -lh "$VSIX_FILE"

      - uses: actions/upload-artifact@v4
        if: steps.should_build.outputs.build == 'true'
        with:
          name: testagent-vscode-${{ matrix.target }}
          path: packages/kilo-vscode/testagent-vscode-${{ matrix.target }}.vsix
          retention-days: 7


  smoke-test:
    name: Smoke Test (pre-publish gate)
    needs:
      - version
      - build-cli
    if: github.repository == 'AI-Testing-Workbench/testagent-kilo' # testagent_change
    uses: ./.github/workflows/smoke-test.yml
    with:
      cli_version: ${{ needs.version.outputs.version }}
    secrets: inherit
  # kilocode_change end
  publish:
    needs:
      - version
      - build-cli
      - build-vscode
      - smoke-test
    runs-on: ubuntu-24.04
    if: needs.version.outputs.release == 'true'
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      # 只用来跑 gh release upload
      - uses: ./.github/actions/setup-bun

      - name: Setup Git Committer
        id: committer
        uses: ./.github/actions/setup-git-committer
        with:
          kilo-maintainer-app-id: ${{ secrets.KILO_MAINTAINER_APP_ID }}
          kilo-maintainer-app-secret: ${{ secrets.KILO_MAINTAINER_APP_SECRET }}

      # 下载 CLI 产物
      - uses: actions/download-artifact@v4
        with:
          pattern: testagent-cli-*
          path: packages/testagent-core/packages/opencode/dist

      # 下载 VS Code 插件产物
      - uses: actions/download-artifact@v4
        with:
          pattern: testagent-vscode-*
          path: packages/kilo-vscode/out
          merge-multiple: true

      # 创建 CLI 压缩包
      - name: Create CLI release archives
        run: |
          cd packages/testagent-core/packages/opencode

          for artifact_dir in dist/testagent-cli-*/; do
            [ -d "$artifact_dir" ] || continue
            artifact=$(basename "$artifact_dir")
            target=${artifact#testagent-cli-}

            # map build target to output_dir naming convention
            case "$target" in
              win32-x64)   plat="testagent-windows-x64-baseline" ;;
              win32-arm64) plat="testagent-windows-arm64" ;;
              alpine-x64)  plat="testagent-linux-x64-musl" ;;
              alpine-arm64) plat="testagent-linux-arm64-musl" ;;
              *)           plat="testagent-${target}" ;;
            esac

            if [[ "$target" == win32-* ]]; then
              (cd "$artifact_dir" && zip -r "../../dist/${plat}.zip" .)
            else
              tar -czf "dist/${plat}.tar.gz" -C "$artifact_dir" .
            fi
          done

          ls -lh dist/*.tar.gz dist/*.zip || true

      # 上传 CLI 到 GitHub Release
      - name: Upload CLI archives to GitHub Release
        run: |
          gh release upload v${{ needs.version.outputs.version }} \
            packages/testagent-core/packages/opencode/dist/*.tar.gz \
            packages/testagent-core/packages/opencode/dist/*.zip \
            --clobber \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ steps.committer.outputs.token }}

      # 上传 VSIX 到 GitHub Release
      - name: Upload VSIX to GitHub Release
        run: |
          gh release upload v${{ needs.version.outputs.version }} \
            packages/kilo-vscode/out/*.vsix \
            --clobber \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ steps.committer.outputs.token }}